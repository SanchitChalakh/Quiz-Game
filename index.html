<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C-Master | Vrushabh Dakhane</title>
    <style>
        :root {
            --bg: #0b0e14;
            --card: #161b22;
            --primary: #58a6ff;
            --accent: #f0883e;
            --success: #3fb950;
            --danger: #f85149;
            --text: #c9d1d9;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .page {
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            position: absolute; transition: 0.5s ease;
            padding: 20px; box-sizing: border-box;
        }

        .hidden { display: none !important; opacity: 0; transform: scale(0.9); }

        .glass-card {
            background: var(--card);
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            width: 100%;
            max-width: 480px;
            text-align: center;
            border: 1px solid #30363d;
        }

        input {
            background: #0d1117;
            border: 1px solid #30363d;
            color: white;
            padding: 12px;
            width: 85%;
            border-radius: 8px;
            margin: 15px 0;
            font-size: 1rem;
        }

        .btn {
            background: var(--primary);
            color: #0d1117;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }

        .playstore-btn {
            background: #000;
            color: #fff;
            border: 1px solid #555;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
            text-decoration: none;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.9rem;
        }

        .timer-bar { width: 100%; height: 6px; background: #30363d; border-radius: 10px; margin: 15px 0; }
        #timer-fill { width: 100%; height: 100%; background: var(--success); transition: linear 1s; }

        .option-btn {
            background: #21262d;
            color: var(--text);
            border: 1px solid #30363d;
            padding: 14px;
            border-radius: 8px;
            cursor: pointer;
            text-align: left;
            margin-bottom: 10px;
            width: 100%;
        }

        .option-btn:hover { border-color: var(--primary); background: #30363d; }

        .creator { position: fixed; bottom: 15px; font-size: 0.8rem; opacity: 0.6; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div id="page-menu" class="page">
        <div class="glass-card">
            <h1 style="color: var(--primary); margin: 0;">C-MASTER</h1>
            <p style="margin-top: 5px; opacity: 0.8;">Ultimate 50 Question Quiz</p>
            
            <input type="text" id="gamer-name" placeholder="Enter Nickname...">
            <button class="btn" onclick="startGame()">START QUIZ</button>

            <a href="https://play.google.com/store" target="_blank" class="playstore-btn">
                <img src="https://upload.wikimedia.org/wikipedia/commons/7/78/Google_Play_Store_badge_EN.svg" alt="Play Store" width="120">
            </a>
            
            <div id="mini-leaderboard" style="margin-top: 20px; font-size: 0.8rem; text-align: left; border-top: 1px solid #30363d; padding-top: 10px;">
                <strong>TOP PLAYERS:</strong>
                <div id="lb-list">No scores yet.</div>
            </div>
        </div>
    </div>

    <div id="page-game" class="page hidden">
        <div class="glass-card">
            <div style="display:flex; justify-content: space-between; font-size: 0.9rem; font-weight: bold;">
                <span id="p-name" style="color: var(--accent);"></span>
                <span id="p-count"></span>
            </div>
            <div class="timer-bar"><div id="timer-fill"></div></div>
            <h3 id="q-text" style="text-align: left; min-height: 70px;"></h3>
            <div id="options"></div>
        </div>
    </div>

    <div id="page-result" class="page hidden">
        <div class="glass-card">
            <h2 style="color: var(--success);">CHALLENGE COMPLETE</h2>
            <h1 id="res-score" style="font-size: 3.5rem; margin: 10px 0;"></h1>
            <p id="res-rank" style="font-weight: bold; color: var(--accent);"></p>
            <button class="btn" onclick="location.reload()">BACK TO MENU</button>
        </div>
    </div>

    <div class="creator">CREATOR: VRUSHABH DAKHANE</div>

    <script>
        const questions = [
            { q: "Who developed C language?", a: "Dennis Ritchie", opts: ["Dennis Ritchie", "Ken Thompson", "Bjarne Stroustrup", "James Gosling"] },
            { q: "Which year was C released?", a: "1972", opts: ["1972", "1968", "1980", "1991"] },
            { q: "C is a ____ level language.", a: "Middle", opts: ["Low", "High", "Middle", "None"] },
            { q: "Correct format specifier for float?", a: "%f", opts: ["%d", "%f", "%s", "%c"] },
            { q: "Which symbol is for Logical AND?", a: "&&", opts: ["&", "||", "&&", "AND"] },
            { q: "Used to end a statement in C?", a: ";", opts: [":", ".", ";", "!"] },
            { q: "Which function is used for output?", a: "printf()", opts: ["print()", "printf()", "cout", "echo"] },
            { q: "Which function is used for input?", a: "scanf()", opts: ["get()", "input()", "read()", "scanf()"] },
            { q: "Minimum functions in C program?", a: "1", opts: ["0", "1", "2", "3"] },
            { q: "Default return type of main()?", a: "int", opts: ["void", "char", "int", "float"] },
            { q: "Size of char in C?", a: "1 byte", opts: ["1 byte", "2 bytes", "4 bytes", "8 bytes"] },
            { q: "C language developed at?", a: "AT&T Bell Labs", opts: ["Google", "Microsoft", "AT&T Bell Labs", "IBM"] },
            { q: "Which is a valid variable name?", a: "my_var", opts: ["123var", "my var", "my_var", "$var"] },
            { q: "Header for math functions?", a: "math.h", opts: ["stdio.h", "conio.h", "math.h", "string.h"] },
            { q: "Operator for remainder?", a: "%", opts: ["/", "%", "*", "#"] },
            { q: "Which loop runs at least once?", a: "do-while", opts: ["for", "while", "do-while", "if"] },
            { q: "Keyword to skip iteration?", a: "continue", opts: ["break", "skip", "continue", "pass"] },
            { q: "Keyword to exit loop?", a: "break", opts: ["stop", "break", "return", "exit"] },
            { q: "String termination character?", a: "\\0", opts: ["\\n", "\\t", "\\0", "\\r"] },
            { q: "Array index starts from?", a: "0", opts: ["0", "1", "-1", "Custom"] },
            { q: "Is C case sensitive?", a: "Yes", opts: ["Yes", "No", "Sometimes", "Only for strings"] },
            { q: "Operator for 'address of'?", a: "&", opts: ["*", "&", "->", "@"] },
            { q: "Operator for value at address?", a: "*", opts: ["&", "*", ".", "#"] },
            { q: "Function for string length?", a: "strlen()", opts: ["size()", "count()", "strlen()", "length()"] },
            { q: "Pre-processor symbol?", a: "#", opts: ["$", "@", "#", "!"] },
            { q: "Which is not a keyword?", a: "integer", opts: ["auto", "volatile", "integer", "static"] },
            { q: "Size of int in 32-bit?", a: "4 bytes", opts: ["2 bytes", "4 bytes", "8 bytes", "1 byte"] },
            { q: "Constant declaration keyword?", a: "const", opts: ["fixed", "const", "final", "static"] },
            { q: "Dynamic memory function?", a: "malloc()", opts: ["alloc()", "new()", "malloc()", "create()"] },
            { q: "Memory deallocation function?", a: "free()", opts: ["delete()", "remove()", "free()", "clear()"] },
            { q: "Result of 5/2 in C (int)?", a: "2", opts: ["2.5", "2", "3", "Error"] },
            { q: "Escape sequence for newline?", a: "\\n", opts: ["\\t", "\\r", "\\n", "\\b"] },
            { q: "Which header for printf()?", a: "stdio.h", opts: ["stdlib.h", "stdio.h", "conio.h", "io.h"] },
            { q: "Used to jump to a label?", a: "goto", opts: ["jump", "move", "goto", "skip"] },
            { q: "Logical NOT operator?", a: "!", opts: ["~", "!", "NOT", "^"] },
            { q: "Bitwise OR operator?", a: "|", opts: ["||", "&", "|", "^"] },
            { q: "What is an array?", a: "Collection of same types", opts: ["Diverse types", "Collection of same types", "A pointer", "A function"] },
            { q: "Correct way to declare a pointer?", a: "int *p;", opts: ["int p*;", "int *p;", "pointer p;", "int &p;"] },
            { q: "Storage for address of variable?", a: "Pointer", opts: ["Array", "Variable", "Pointer", "Macro"] },
            { q: "Can we use keyword as variable name?", a: "No", opts: ["Yes", "No", "Only main", "None"] },
            { q: "Function to compare strings?", a: "strcmp()", opts: ["strcm()", "strcmp()", "strcp()", "equal()"] },
            { q: "Bitwise left shift?", a: "<<", opts: [">>", "<<", "<", ">"] },
            { q: "Correct macro definition?", a: "#define MAX 10", opts: ["define MAX 10", "#define MAX 10", "const MAX = 10", "#macro MAX 10"] },
            { q: "Size of double?", a: "8 bytes", opts: ["4 bytes", "8 bytes", "12 bytes", "16 bytes"] },
            { q: "Which is ternary operator?", a: "? :", opts: ["&&", "!", "? :", "=="] },
            { q: "Recursion is ____?", a: "Function calling itself", opts: ["A loop", "Function calling itself", "A pointer", "Memory allocation"] },
            { q: "What is 'void'?", a: "No value", opts: ["Null", "Zero", "No value", "Pointer"] },
            { q: "Which header for malloc?", a: "stdlib.h", opts: ["stdio.h", "stdlib.h", "math.h", "conio.h"] },
            { q: "Shortest data type?", a: "char", opts: ["short", "int", "char", "float"] },
            { q: "C follows ____ programming.", a: "Top-down", opts: ["Bottom-up", "Top-down", "Parallel", "Circular"] }
        ];

        let current = 0, score = 0, timeLeft = 15, timer;

        function startGame() {
            const name = document.getElementById('gamer-name').value;
            if(!name) return alert("Enter Name!");
            document.getElementById('page-menu').classList.add('hidden');
            document.getElementById('page-game').classList.remove('hidden');
            document.getElementById('p-name').innerText = name;
            loadQ();
        }

        function loadQ() {
            clearInterval(timer);
            timeLeft = 15;
            updateTimerUI();
            const q = questions[current];
            document.getElementById('p-count').innerText = `${current+1}/50`;
            document.getElementById('q-text').innerText = q.q;
            const optDiv = document.getElementById('options');
            optDiv.innerHTML = "";
            q.opts.forEach(o => {
                const btn = document.createElement('button');
                btn.className = "option-btn";
                btn.innerText = o;
                btn.onclick = () => check(o);
                optDiv.appendChild(btn);
            });
            timer = setInterval(() => {
                timeLeft--;
                updateTimerUI();
                if(timeLeft <= 0) check(null);
            }, 1000);
        }

        function updateTimerUI() {
            const fill = document.getElementById('timer-fill');
            fill.style.width = (timeLeft/15)*100 + "%";
            fill.style.background = timeLeft < 5 ? "var(--danger)" : "var(--success)";
        }

        function check(choice) {
            if(choice === questions[current].a) score++;
            current++;
            if(current < 50) loadQ();
            else showResult();
        }

        function showResult() {
            document.getElementById('page-game').classList.add('hidden');
            document.getElementById('page-result').classList.remove('hidden');
            document.getElementById('res-score').innerText = `${score}/50`;
            
            let rank = score > 40 ? "C LEGEND" : score > 20 ? "DEVELOPER" : "STUDENT";
            document.getElementById('res-rank').innerText = "RANK: " + rank;
            
            const name = document.getElementById('gamer-name').value;
            save(name, score);
        }

        function save(n, s) {
            let lb = JSON.parse(localStorage.getItem('cMasterLB')) || [];
            lb.push({n, s});
            lb.sort((a,b) => b.s - a.s);
            localStorage.setItem('cMasterLB', JSON.stringify(lb.slice(0, 3)));
        }

        const lbData = JSON.parse(localStorage.getItem('cMasterLB')) || [];
        if(lbData.length) document.getElementById('lb-list').innerHTML = lbData.map(x => `<div>🥇 ${x.n}: ${x.s}</div>`).join('');
    </script>
</body>
</html>
